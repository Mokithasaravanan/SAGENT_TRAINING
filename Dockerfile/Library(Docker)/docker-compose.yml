services:

  mysql:
    image: mysql:8.0
    container_name: library_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: moki@amma123
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmoki@amma123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: "D:/Library(Docker)/Backend/library-management"
      dockerfile: Dockerfile
    container_name: library_backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/library_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: moki@amma123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - library-network

  frontend:
    build:
      context: "D:/Library(Docker)/Frontend/library-frontend"
      dockerfile: Dockerfile
    container_name: library_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - library-network

volumes:
  mysql_data:

networks:
  library-network:
    driver: bridge
