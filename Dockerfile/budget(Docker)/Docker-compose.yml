version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: budget_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: moki@amma123
      MYSQL_DATABASE: budget_tracker
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - budget-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmoki@amma123"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend/budget-tracker
      dockerfile: Dockerfile
    container_name: budget_backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/budget_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: moki@amma123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - budget-network

  frontend:
    build:
      context: ./Frontend/budget-tracker
      dockerfile: Dockerfile
    container_name: budget_frontend
    restart: always
    ports:
      - "3000:3000"
    stdin_open: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - budget-network

networks:
  budget-network:
    driver: bridge

volumes:
  mysql_data: