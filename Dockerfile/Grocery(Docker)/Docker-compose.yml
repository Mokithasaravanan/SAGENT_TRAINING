services:

  mysql:
    image: mysql:8.0
    container_name: grocery_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: moki@amma123
      MYSQL_DATABASE: grocery_delivery_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - grocery-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend/grocery-delivery
      dockerfile: Dockerfile
    container_name: grocery_backend
    restart: always
    ports:
      - "8082:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/grocery_delivery_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: moki@amma123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grocery-network

  frontend:
    build:
      context: ./Frontend/grocery-app
      dockerfile: Dockerfile
    container_name: grocery_frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - grocery-network

networks:
  grocery-network:
    driver: bridge

volumes:
  mysql_data: